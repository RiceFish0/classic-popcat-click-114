<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
            .title {
                width: 80%;
                max-width: 600px;
                height: auto;
                margin-top: 2em;
                user-select: none;
            }
            .header-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                height: 100vh;
                background-color: #a5a8d3;
                gap: 12px;
            }
            .cat-img {
                font-size: 80px;
                margin-top: 20px;
                width: 100%;
                max-width: 800px;
                text-align: center;
                color: #ffffff;
                -webkit-text-stroke: 3px #000000;
                flex: 1;
                user-select: none;
            }

            #p {
                background-image: url('imgs/p.png');
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }

            /* new text div with background */
            #op {
                background-image: url('imgs/op.png');
                background-position: bottom center;
                background-size: contain;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    <body>  
        <div class="header-container">
            <img class="title" src="imgs/popcat.svg" alt="POPCAT CLASSIC" >
            <div class="cat-img" id="p">0</div>
            <div id="op"></div>
        </div>
    </body>

</html>
